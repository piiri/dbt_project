version: 2

models:
  - name: stg_patients
    description: Cleaned patient demographics with computed age
    columns:
      - name: PATIENT_ID
        tests:
          - unique
          - not_null
      - name: GENDER
        tests:
          - not_null
          - accepted_values:
              values: ['Male', 'Female']
      - name: INSURANCE_PROVIDER
        tests:
          - not_null
          - accepted_values:
              values: ['Star Health', 'ICICI Lombard', 'HDFC ERGO', 'Max Bupa', 'Bajaj Allianz', 'New India Assurance']
      - name: INSURANCE_PLAN
        tests:
          - not_null
          - accepted_values:
              values: ['Gold', 'Silver', 'Platinum']
      - name: BLOOD_GROUP
        tests:
          - not_null
          - accepted_values:
              values: ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-']

  - name: stg_doctors
    description: Cleaned doctor directory with full name
    columns:
      - name: DOCTOR_ID
        tests:
          - unique
          - not_null
      - name: SPECIALIZATION
        tests:
          - not_null
          - accepted_values:
              values: ['Cardiology', 'Dermatology', 'General Medicine', 'Orthopedics', 'Psychiatry', 'Pediatrics', 'ENT', 'Gynecology', 'Neurology', 'Diabetology']
      - name: CONSULTATION_FEE
        tests:
          - not_null
      - name: LICENSE_NUMBER
        tests:
          - unique
          - not_null

  - name: stg_consultations
    description: Patient-doctor consultation events
    columns:
      - name: CONSULTATION_ID
        tests:
          - unique
          - not_null
      - name: PATIENT_ID
        tests:
          - not_null
          - relationships:
              to: source('healthcare_raw', 'patients')
              field: PATIENT_ID
      - name: DOCTOR_ID
        tests:
          - not_null
          - relationships:
              to: source('healthcare_raw', 'doctors')
              field: DOCTOR_ID
      - name: CONSULTATION_TYPE
        tests:
          - not_null
          - accepted_values:
              values: ['In-Person', 'Online']

  - name: stg_prescriptions
    description: Medicines prescribed during consultations
    columns:
      - name: PRESCRIPTION_ID
        tests:
          - unique
          - not_null
      - name: CONSULTATION_ID
        tests:
          - not_null
          - relationships:
              to: source('healthcare_raw', 'consultations')
              field: CONSULTATION_ID
      - name: PATIENT_ID
        tests:
          - not_null
      - name: MEDICINE_NAME
        tests:
          - not_null

  - name: stg_orders
    description: Medicine orders with delivery tracking
    columns:
      - name: ORDER_ID
        tests:
          - unique
          - not_null
      - name: ORDER_STATUS
        tests:
          - not_null
          - accepted_values:
              values: ['Placed', 'Processing', 'Shipped', 'Delivered', 'Cancelled']
      - name: DELIVERY_TYPE
        tests:
          - not_null
          - accepted_values:
              values: ['Home Delivery', 'Store Pickup']
      - name: TOTAL_AMOUNT
        tests:
          - not_null

  - name: stg_payments
    description: Payment transactions with insurance breakdown
    columns:
      - name: PAYMENT_ID
        tests:
          - unique
          - not_null
      - name: PAYMENT_METHOD
        tests:
          - not_null
          - accepted_values:
              values: ['UPI', 'Credit Card', 'Debit Card', 'Cash', 'Net Banking']
      - name: PAYMENT_STATUS
        tests:
          - not_null
          - accepted_values:
              values: ['Success', 'Pending', 'Refunded', 'Failed']
      - name: AMOUNT
        tests:
          - not_null

  - name: scd2_patients
    description: SCD Type 2 — full change history for patient demographics
    columns:
      - name: scd_key
        tests:
          - unique
          - not_null
      - name: PATIENT_ID
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - accepted_values:
              values: [true, false]

  - name: scd2_doctors
    description: SCD Type 2 — full change history for doctor directory
    columns:
      - name: scd_key
        tests:
          - unique
          - not_null
      - name: DOCTOR_ID
        tests:
          - not_null
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - accepted_values:
              values: [true, false]

  - name: scd1_orders
    description: SCD Type 1 — latest order status (overwrite)
    columns:
      - name: ORDER_ID
        tests:
          - unique
          - not_null
      - name: ORDER_STATUS
        tests:
          - not_null
          - accepted_values:
              values: ['Placed', 'Processing', 'Shipped', 'Delivered', 'Cancelled']

  # ── Dimension Tables ──────────────────────────────

  - name: dim_date
    description: Calendar date dimension for 2025
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null

  - name: dim_patients
    description: Current patient dimension (from SCD2, current records only)
    columns:
      - name: patient_key
        tests:
          - unique
          - not_null
      - name: PATIENT_ID
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: GENDER
        tests:
          - accepted_values:
              values: ['Male', 'Female']

  - name: dim_doctors
    description: Current doctor dimension (from SCD2, current records only)
    columns:
      - name: doctor_key
        tests:
          - unique
          - not_null
      - name: DOCTOR_ID
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null
      - name: SPECIALIZATION
        tests:
          - not_null

  - name: dim_diagnosis
    description: Distinct ICD-10 diagnosis codes from consultations
    columns:
      - name: diagnosis_key
        tests:
          - unique
          - not_null
      - name: DIAGNOSIS_CODE
        tests:
          - unique
          - not_null

  # ── Fact Tables ────────────────────────────────────

  - name: fct_consultations
    description: Fact table — one row per consultation with prescription metrics
    columns:
      - name: CONSULTATION_ID
        tests:
          - unique
          - not_null
      - name: patient_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_key
      - name: doctor_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_doctors')
              field: doctor_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: CONSULTATION_TYPE
        tests:
          - accepted_values:
              values: ['In-Person', 'Online']
      - name: prescription_count
        tests:
          - not_null
      - name: DURATION_MINUTES
        tests:
          - not_null

  - name: fct_orders
    description: Fact table — one row per medicine order with payment and insurance details
    columns:
      - name: ORDER_ID
        tests:
          - unique
          - not_null
      - name: patient_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_patients')
              field: patient_key
      - name: doctor_key
        tests:
          - relationships:
              to: ref('dim_doctors')
              field: doctor_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: diagnosis_key
        tests:
          - relationships:
              to: ref('dim_diagnosis')
              field: diagnosis_key
      - name: TOTAL_AMOUNT
        tests:
          - not_null
      - name: ORDER_STATUS
        tests:
          - not_null
          - accepted_values:
              values: ['Placed', 'Processing', 'Shipped', 'Delivered', 'Cancelled']
